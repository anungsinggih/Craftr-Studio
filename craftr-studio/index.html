<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Craftr Studio V2 - Premium Mockup Engine</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        gray: {
                            850: '#1f2937',
                            900: '#111827',
                            950: '#030712',
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #4b5563;
        }

        /* Cropper CSS */
        .crop-container {
            position: relative;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        /* Custom Range Slider */
        input[type=range].adj-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(to right, #374151, #4f46e5, #374151);
            outline: none;
            cursor: pointer;
        }

        input[type=range].adj-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #818cf8;
            border: 2px solid #312e81;
            box-shadow: 0 0 6px rgba(99, 102, 241, 0.5);
            cursor: grab;
            transition: transform 0.15s;
        }

        input[type=range].adj-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        input[type=range].adj-slider::-webkit-slider-thumb:active {
            cursor: grabbing;
            transform: scale(1.1);
        }

        input[type=range].adj-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #818cf8;
            border: 2px solid #312e81;
            box-shadow: 0 0 6px rgba(99, 102, 241, 0.5);
            cursor: grab;
        }

        .nudge-btn {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            background: #1f2937;
            color: #a5b4fc;
            border: 1px solid #374151;
            transition: all 0.15s;
        }

        .nudge-btn:hover {
            background: #312e81;
            border-color: #4f46e5;
        }

        .nudge-btn:active {
            transform: scale(0.9);
        }

        @media (max-width: 860px) {
            html,
            body,
            #root {
                height: 100%;
                overflow: hidden;
            }

            body {
                background: #eef2f7 !important;
            }

            #root > div {
                height: 100dvh;
                min-height: 0 !important;
                overflow: hidden;
                background: #eef2f7 !important;
            }

            header {
                position: sticky;
                top: 0;
                z-index: 50;
                border-radius: 0 0 22px 22px;
                box-shadow: 0 12px 28px rgba(15, 23, 42, 0.12);

            main {
                height: calc(100dvh - 64px);
                min-height: 0;
                overflow: hidden;
                padding: 10px !important;
                gap: 10px !important;

            main > div:first-child {
                min-height: 0;
                height: 43dvh;
                overflow-y: auto;
            }

            main > div:first-child > div:first-child {
                min-height: 100% !important;
                border-radius: 24px !important;
                padding: 14px !important;
            }

            main > div:last-child {
                width: 100% !important;
                max-height: calc(57dvh - 22px);
                overflow-y: auto;
                border-radius: 26px 26px 0 0;
                padding-bottom: calc(18px + env(safe-area-inset-bottom, 0px));
            }

            main > div:last-child > div {
                border-radius: 22px !important;
                padding: 16px !important;
            }

            button,
            select,
            textarea,
            input {
                font-size: 16px;
            }

                min-height: 44px;
                border-radius: 14px !important;

            input[type="range"] {

<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 transition-colors duration-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // ============================================================================
        // 1. CONFIGURATION & PROMPT CONSTANTS
        // ============================================================================
        const API_MODEL = "gemini-2.5-flash-image-preview";
        const API_KEY = typeof __api_key !== 'undefined' ? __api_key : ''; // Inject here if needed
        const GEMINI_API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${API_MODEL}:generateContent?key=${API_KEY}`;

        const DISC_DIAMETER_CM = 20;
        const EXPORT_PPI = 300;
        const DISC_PX = Math.round((DISC_DIAMETER_CM / 2.54) * EXPORT_PPI);

        // Core Contract
        const MANDATORY_COLOR_ENFORCEMENT = "Use sterile, neutral lighting. Ensure the background elements do not cast color onto the disc.";

        const BASE_SYSTEM_INSTRUCTION = `
Act as an expert e-commerce product photographer. Your goal is to produce a mockup that is **IDENTICAL to the real physical product** a customer would receive.
The product is a circular **20cm diameter, 6mm thick MDF board** with a full-coverage printed Art Paper sticker on the front face.

**REAL PRODUCT ACCURACY (HIGHEST PRIORITY):**
In real life, the printed sticker covers 100% of the front face — edge to edge. When viewed from the front, the customer sees ONLY the printed design and NO wood border/rim.
The 6mm MDF edge (light brown wood) is only barely visible as a very thin hairline at the outer perimeter, because the camera is nearly straight-on.
Do NOT exaggerate the MDF edge thickness. It should be at most 1-2 pixels wide in the final render — a subtle hint, NOT a prominent ring or border.

**TEXTURE MAPPING RULE:**
The uploaded input image is a PRE-PRINTED PHOTOGRAPH physically applied to the board.
Treat it as an **OPAQUE PHOTOGRAPHIC TEXTURE** — do NOT read, interpret, modify, or regenerate any content within it.
Apply the input as-is like a UV texture map, preserving every pixel exactly.
The print must look **perfectly flat, matte, and 2D** — no gloss, no reflections, no shadows ON the print surface.

**PRODUCT ISOLATION:** The printed surface must maintain 100% color fidelity. No color spill from background lighting.

**DVD ONLY:** For DVD concepts, render a center spindle hole as solid pure black (#000000).
`;

        const GLOBAL_INVARIANTS_SYSTEM_INSTRUCTION = `
[SYSTEM: GLOBAL INVARIANTS — DISC MOCKUP CONTRACT]

A. Product fidelity
- The printed artwork is a pixel-faithful 2D replica of the input.
- No relighting, no LUT/tone-mapping, no hue/saturation shift, no bloom on print.
- Color Spill Exclusion: background lighting and props never tint the print.

B. Physical scale & geometry
- Disc diameter = 200 mm exactly.
- The product is a circular 6mm thick MDF board. The side edge is light brown wood, but since the camera is nearly frontal, this edge should appear as a very thin hairline (1-2px), NOT a thick border.

C. Stand / Hanging contract
- If placement = "table_stand" or "both", the disc rests on a black decorative plate display stand.
- If placement = "wall_mount", the disc hangs flat on the wall. NO STAND, NO PROPS, NO HOOKS VISIBLE.
- Finish: black matte; NO colorful reflections.

D. Camera & composition
- Camera angle: **nearly straight-on frontal view** (0-3 degree tilt). The product face must be almost perfectly parallel to the camera sensor.
- This means the 6mm side edge of the MDF board is barely visible — just a very thin hairline at the perimeter.
- Product centered in frame.
- **CRITICAL SCALE:** The product must NOT fill the entire frame. Leave generous negative space. The product should occupy roughly 50-60% of the vertical frame.

E. Lighting hygiene
- Key light on disc print = D65 neutral, flat, diffuse.
- Specular Kill on print area.
- Shadows: one soft penumbra on the supporting surface or wall, opacity 8-20%.

F. Background effects containment
- All stylization confined to BACKGROUND LAYER ONLY. Never bleed onto disc print.

G. **PRINT MAPPING CONTRACT (MANDATORY — ZERO TOLERANCE)**
- The input image is the FINAL artwork. It has already been pre-cropped and margin-adjusted.
- Map the input 1:1 onto the circular front face. NO cropping, NO zooming, NO scaling up, NO repositioning.
- If the input has a white/colored margin near the edge, that margin MUST remain visible on the board. Do NOT remove or clip it.
- ALL text, logos, and graphic elements from the input MUST be 100% visible on the rendered board.
- The rendered artwork boundary MUST exactly match the physical board edge. No artwork may extend beyond or be clipped by the edge.
- This rule overrides any artistic preference to "fill" or "bleed" the artwork.
`;

        const NEGATIVE_PROMPT_BLOCK = `
[NEGATIVE PROMPTS / DO NOT DO THIS]
- DO NOT render a thick or prominent wood border/rim around the product. The MDF edge is only 6mm and barely visible from the front.
- DO NOT add shadows, glare, specular highlights, reflections, or gradient lighting TO THE PRINTED ARTWORK itself.
- DO NOT change the aspect ratio, color palette, or layout of the uploaded image.
- DO NOT crop, zoom in, scale up, or reposition the artwork on the board. The input is FINAL.
- DO NOT cut off any text or graphics near the edges.
- DO NOT use an A-frame easel or tripod-style stand.
- DO NOT place the disc off-center.
- DO NOT add floating elements, lens flares overlapping the product, or dramatic rim lights hitting the print.
- DO NOT skew or tilt the disc more than 3 degrees.
`;

        const DVD_OVERRIDE_PROMPT = `
[DVD OVERRIDE]
**CRITICAL:** The product is a DVD/CD style disc.
- Center Hole: Exactly 15mm diameter, perfectly black (#000000).
- Data Ring: Metallic silver/transparent ring extending from 20mm to 36mm diameter.
`;

        const POLOS_OVERRIDE_PROMPT = `
[POLOS OVERRIDE]
**CRITICAL:** The product is a SOLID MDF BOARD with full-coverage print. There is NO CENTER HOLE.
The printed sticker covers 100% of the front face. From the front camera angle, the customer sees ONLY the print — no wood border, no rim, no unprinted area.
The artwork is ALREADY the final version — map it exactly as-is, no cropping, no zoom.
`;

        const BOTH_SPEC_PROMPT = `
[BOTH VIEW ENFORCEMENT]
Render TWO instances of the same product:
- Foreground: on tabletop with the stand.
- Background: wall-mounted copy of the SAME 200 mm product.
Both must maintain identical physical size. No extra stands are invented for the background copy.
`;

        // Print fidelity anchor — appended to EVERY scene preset to prevent AI from "forgetting" the input
        const PRINT_ANCHOR = `\nIMPORTANT REMINDER: The circular disc in the uploaded image contains the EXACT artwork to render. Do NOT regenerate, re-draw, or modify the artwork. The print on the board must be a pixel-identical copy of the uploaded disc. Focus your creativity ONLY on the background/scene — NEVER on the disc print itself.`;

        const SCENE_PRESETS = [
            {
                value: 'minimalis',
                label: 'Minimalist Clean',
                prompt: `A photorealistic product photo: The MDF board product is displayed in a bright, modern, minimalist studio. Background: clean, seamless light gray or off-white. Lighting: very soft, diffused, neutral (D65). A single soft shadow beneath the product anchors it. No extra props, no decorations. The product's printed face must remain UNTOUCHED and pixel-identical to the input.${PRINT_ANCHOR}`
            },
            {
                value: 'warm_retro',
                label: 'Warm Retro (Vintage Tech)',
                prompt: `A photorealistic product photo: The MDF board product sits in a warm, nostalgic setting. Background (BLURRED): vintage audio equipment on a walnut wood shelf. Lighting: warm golden-hour ambiance on the BACKGROUND ONLY. CRITICAL: The warm lighting must NOT tint or color-shift the printed artwork on the product face. The print stays neutral and pixel-identical to the input.${PRINT_ANCHOR}`
            },
            {
                value: 'neon_gaming',
                label: 'Neon Gaming / Cyberpunk',
                prompt: `A photorealistic product photo: The MDF board product is on a matte black desk in a dark gaming room. Background (DEEPLY BLURRED): subtle RGB LED strips and neon signs casting pink/cyan on distant walls only. CRITICAL: The neon colors must NEVER reflect onto or tint the printed artwork surface. The print on the board must remain color-accurate and pixel-identical to the input.${PRINT_ANCHOR}`
            },
            {
                value: 'industrial_shelf',
                label: 'Industrial Shelf (Modern)',
                prompt: `A photorealistic product photo: The MDF board product rests on a black metal industrial shelf. Background: light gray concrete wall with subtle texture. Lighting: warm overhead track lighting illuminating the scene. CRITICAL: The print artwork on the product must remain neutral, unaffected by scene lighting. Pixel-identical to the input.${PRINT_ANCHOR}`
            },
            {
                value: 'cozy_nook',
                label: 'Cozy Bookshelf Nook',
                prompt: `A photorealistic product photo: The MDF board product sits on a shelf in a rustic wooden bookshelf. Background: blurred books and a small potted plant. Lighting: warm amber from the side (natural window light). CRITICAL: The warm light must illuminate the SCENE/BACKGROUND only — the printed artwork on the product face must remain color-neutral and pixel-identical to the input.${PRINT_ANCHOR}`
            }
        ];

        // ============================================================================
        // 2. HELPER FUNCTIONS
        // ============================================================================
        const fetchWithRetry = async (url, options, retries = 2) => {
            for (let i = 0; i < retries; i++) {
                try {
                    const res = await fetch(url, options);
                    if (res.status === 429) {
                        await new Promise(r => setTimeout(r, 2000 * (i + 1)));
                        continue;
                    }
                    return res;
                } catch (err) {
                    if (i === retries - 1) throw err;
                    await new Promise(r => setTimeout(r, 1000));
                }
            }
            throw new Error("Max retries reached");
        };

        const mmToPxRadius = (canvasSizePx, mm) => {
            const radiusPx = canvasSizePx / 2;
            return (mm / (DISC_DIAMETER_CM * 10 / 2)) * radiusPx;
        };

        // ============================================================================
        // 3. MAIN COMPONENT
        // ============================================================================
        function CraftrStudioV2() {
            // State: UI & Global
            const [theme, setTheme] = useState("dark");
            const [toasts, setToasts] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [loadingText, setLoadingText] = useState("");

            // State: Presets
            const [discType, setDiscType] = useState("polos"); // polos | dvd
            const [productType, setProductType] = useState("table_stand"); // table_stand | wall_mount | framed | both
            const [presetStyle, setPresetStyle] = useState("minimalis");
            const [customScene, setCustomScene] = useState("");

            // State: Image & Canvas
            const [originalImage, setOriginalImage] = useState(null);
            const [circularPreviewURL, setCircularPreviewURL] = useState(null);
            const [mockupResults, setMockupResults] = useState([]); // Array of {url, status} for batch
            const [selectedIdx, setSelectedIdx] = useState(0);

            // State: Image Adjustments
            const [imgZoom, setImgZoom] = useState(1);
            const [imgRotation, setImgRotation] = useState(0);
            const [imgPanX, setImgPanX] = useState(0);
            const [imgPanY, setImgPanY] = useState(0);

            // State: Print Polish (brightness/contrast to match mockup result)
            const [printBrightness, setPrintBrightness] = useState(100);
            const [printContrast, setPrintContrast] = useState(100);
            const [printSaturation, setPrintSaturation] = useState(100);

            // Refs
            const fileInputRef = useRef(null);
            const canvasRef = useRef(null);

            // Toast system
            const pushToast = useCallback((type, title, message) => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, type, title, message }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
            }, []);

            // Theme sync
            useEffect(() => {
                if (theme === 'dark') document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [theme]);

            // File Upload Handling
            const handleFileUpload = (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        setOriginalImage(img);
                        setMockupResults([]);
                        setSelectedIdx(0);
                        // Reset adjustments on new upload
                        setImgZoom(1);
                        setImgRotation(0);
                        setImgPanX(0);
                        setImgPanY(0);
                        pushToast("success", "Image Loaded", "Adjust zoom & rotation, then generate.");
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };

            // Redraw Circular Preview (Client-side Cropping with adjustments)
            const redrawPreview = useCallback(() => {
                if (!originalImage) return null;
                const canvas = document.createElement('canvas');
                canvas.width = DISC_PX;
                canvas.height = DISC_PX;
                const ctx = canvas.getContext('2d');

                // Fill entire canvas with white first
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(0, 0, DISC_PX, DISC_PX);

                // Draw circle mask
                ctx.beginPath();
                ctx.arc(DISC_PX / 2, DISC_PX / 2, DISC_PX / 2, 0, Math.PI * 2);
                ctx.closePath();
                ctx.clip();

                // Detect Edge Color to fill the safety margin
                const tCtx = document.createElement('canvas').getContext('2d');
                tCtx.canvas.width = 1;
                tCtx.canvas.height = 1;
                tCtx.drawImage(originalImage, originalImage.width * 0.05, originalImage.height / 2, 1, 1, 0, 0, 1, 1);
                const [r, g, b, a] = tCtx.getImageData(0, 0, 1, 1).data;
                if (a > 10) {
                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                    ctx.fill();
                }

                // Apply user adjustments: zoom, rotation, pan
                const SAFE_SCALE = 0.92;
                const baseScale = Math.max(DISC_PX / originalImage.width, DISC_PX / originalImage.height) * SAFE_SCALE;
                const finalScale = baseScale * imgZoom;
                const dw = originalImage.width * finalScale;
                const dh = originalImage.height * finalScale;
                const cx = DISC_PX / 2 + (imgPanX * DISC_PX / 100);
                const cy = DISC_PX / 2 + (imgPanY * DISC_PX / 100);

                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate((imgRotation * Math.PI) / 180);
                ctx.drawImage(originalImage, -dw / 2, -dh / 2, dw, dh);
                ctx.restore();

                // Add DVD Hub if needed
                if (discType === 'dvd') {
                    const hubCx = DISC_PX / 2;
                    const hubCy = DISC_PX / 2;
                    const holeR = mmToPxRadius(DISC_PX, 7.5);
                    const innerRingR = mmToPxRadius(DISC_PX, 10);
                    const outerRingR = mmToPxRadius(DISC_PX, 18);
                    ctx.globalCompositeOperation = "source-over";
                    ctx.beginPath(); ctx.arc(hubCx, hubCy, outerRingR, 0, Math.PI * 2);
                    ctx.fillStyle = "rgba(255, 255, 255, 0.4)"; ctx.fill();
                    ctx.strokeStyle = "rgba(0,0,0,0.15)"; ctx.lineWidth = 2; ctx.stroke();
                    ctx.beginPath(); ctx.arc(hubCx, hubCy, innerRingR, 0, Math.PI * 2);
                    ctx.fillStyle = "rgba(200, 200, 200, 0.8)"; ctx.fill(); ctx.stroke();
                    ctx.beginPath(); ctx.arc(hubCx, hubCy, holeR, 0, Math.PI * 2);
                    ctx.fillStyle = "#000000"; ctx.fill();
                }

                const dataUrl = canvas.toDataURL('image/png');
                setCircularPreviewURL(dataUrl);
                return dataUrl;
            }, [originalImage, discType, imgZoom, imgRotation, imgPanX, imgPanY]);

            // Build padded AI input: embed disc preview in a larger canvas with white padding
            // This prevents the AI from cropping by giving clear disc boundary context
            const buildAIInput = useCallback(() => {
                const previewUrl = redrawPreview();
                if (!previewUrl) return null;

                // Create a padded canvas (1.5x the disc size)
                const PAD_FACTOR = 1.5;
                const padSize = Math.round(DISC_PX * PAD_FACTOR);
                const padCanvas = document.createElement('canvas');
                padCanvas.width = padSize;
                padCanvas.height = padSize;
                const padCtx = padCanvas.getContext('2d');

                // White background
                padCtx.fillStyle = '#FFFFFF';
                padCtx.fillRect(0, 0, padSize, padSize);

                // Load the disc preview and center it
                const discImg = new Image();
                discImg.src = previewUrl;
                const offset = (padSize - DISC_PX) / 2;
                padCtx.drawImage(discImg, offset, offset, DISC_PX, DISC_PX);

                return padCanvas.toDataURL('image/png');
            }, [redrawPreview]);

            // Update preview whenever settings change
            useEffect(() => {
                if (originalImage) redrawPreview();
            }, [originalImage, discType, imgZoom, imgRotation, imgPanX, imgPanY, redrawPreview]);

            // ============================================================================
            // PROMPT BUILDER
            // ============================================================================
            const buildPrompt = () => {
                const isDVD = discType === 'dvd';
                const needsStand = productType === "table_stand" || productType === "both";

                const currentPreset = SCENE_PRESETS.find(p => p.value === presetStyle) || SCENE_PRESETS[0];
                let scenePrompt = presetStyle === 'custom'
                    ? `[SCENE: CUSTOM]\nApply user details: ${customScene.trim()}\nRespect GLOBAL INVARIANTS A-G. Keep print identical.`
                    : `[SCENE: ${currentPreset.label.toUpperCase().replace(/\s/g, '_')}]\n${currentPreset.prompt}`;

                const replicateCommand = `TASK: Render a product photography scene containing the MDF board product. The uploaded image shows the circular disc artwork centered on a white background. Extract ONLY the circular disc portion and place it as the printed face of the MDF board. STRICT RULES: (1) The print on the board must be a PIXEL-IDENTICAL reproduction of the disc in the uploaded image. (2) Do NOT read, interpret, or regenerate any text, logos, or graphics — copy them exactly. (3) Do NOT crop, zoom, scale, or reposition the artwork. (4) Apply ALL creative effort to the BACKGROUND SCENE ONLY. The product print is FROZEN and UNTOUCHABLE.`;
                const standInstruction = needsStand ? `\n**MUST INCLUDE** the Black Folding Plate Display Stand as specified in the component contract.` : '';

                let placementDesc = "";
                switch (productType) {
                    case "table_stand": placementDesc = `Disc on tabletop, supported by a black plate display stand. Eye-level camera.`; break;
                    case "wall_mount": placementDesc = `Disc hanging flat on a neutral wall. NO STAND, NO EASEL. Eye-level camera.`; break;
                    case "framed": placementDesc = `Disc inside simple wooden shadow box on a wall. Eye-level camera.`; break;
                    case "both": placementDesc = `One disc on tabletop with stand (foreground) AND another identical disc wall-mounted in background. Eye-level camera.`; break;
                }

                const styleOverride = isDVD ? DVD_OVERRIDE_PROMPT : POLOS_OVERRIDE_PROMPT;
                const bothOverride = (productType === 'both') ? BOTH_SPEC_PROMPT : '';

                return `
[TASK] ${replicateCommand}${standInstruction}

[PLACEMENT] ${placementDesc}

${scenePrompt}

${bothOverride}
${styleOverride}
${NEGATIVE_PROMPT_BLOCK}

[LIGHTING & BG SAFETY] ${MANDATORY_COLOR_ENFORCEMENT}

[FINAL CHECKPOINT — PRINT FIDELITY]
Before outputting, verify: Is the printed artwork on the board face an EXACT, unmodified copy of the circular disc from the input image? If any text, graphic, or color has been changed, RE-DO the render. The print is sacred and immutable.
                `.trim();
            };

            // ============================================================================
            // API CALL
            // ============================================================================
            const handleGenerate = async () => {
                if (!originalImage) return pushToast("error", "Upload Required", "Please upload an image first.");

                const aiInputBase64 = buildAIInput();
                if (!aiInputBase64) return;
                const hiResBase64 = circularPreviewURL || redrawPreview();

                const BATCH_COUNT = 3;
                setIsLoading(true);
                setMockupResults([]);
                setSelectedIdx(0);
                setLoadingText(`Generating ${BATCH_COUNT} variations...`);

                try {
                    let inputForMockup = aiInputBase64;
                    const isDVD = discType === 'dvd';

                    // Stage 1: DVD Hub Generation (ONLY if DVD, single call)
                    if (isDVD) {
                        setLoadingText("Stage 1: Generating CD/DVD Geometry...");
                        const stage1Prompt = `Circular 20cm diameter product made of 6mm thick MDF board with light brown wood edges. Edge-to-edge print on the front. Center hole: 15mm pure black. Data ring: 20mm-36mm silver/transparent. Surface: Smooth Art Paper texture. Output isolated, circular board only, transparent background. Scale 20cm equivalent.`;
                        const payload1 = {
                            contents: [{ role: "user", parts: [{ text: stage1Prompt }, { inlineData: { mimeType: "image/png", data: hiResBase64.replace(/^data:image\/png;base64,/, "") } }] }],
                            systemInstruction: { parts: [{ text: BASE_SYSTEM_INSTRUCTION }] },
                            generationConfig: { responseModalities: ["TEXT", "IMAGE"] }
                        };
                        const res1 = await fetchWithRetry(GEMINI_API_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload1) });
                        if (!res1.ok) throw new Error("DVD Stage Failed");
                        const json1 = await res1.json();
                        const b64 = json1?.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                        if (b64) inputForMockup = `data:image/png;base64,${b64}`;
                    }

                    // Stage 2: Fire N parallel scene generation calls
                    setLoadingText(isDVD ? `Stage 2: Rendering ${BATCH_COUNT} mockups...` : `Rendering ${BATCH_COUNT} mockup variations...`);

                    const systemPrompt = [
                        GLOBAL_INVARIANTS_SYSTEM_INSTRUCTION,
                        BASE_SYSTEM_INSTRUCTION,
                        productType === 'table_stand' || productType === 'both' ? `\n[COMPONENT: STAND SPEC]\nType: Black folding decorative plate display stand (plate easel).\n**CRITICAL:** Stand must be rendered as a **black plastic/wood plate display stand** with two curved front hooks that hold the bottom rim of the disc, and a back supporting leg. Finish: Matte or satin black.` : ''
                    ].filter(Boolean).join("\n\n");

                    const userPrompt = buildPrompt();
                    const imageData = inputForMockup.replace(/^data:image\/png;base64,/, "");

                    // Create N parallel requests
                    const requests = Array.from({ length: BATCH_COUNT }, (_, i) => {
                        const payload = {
                            contents: [{ role: "user", parts: [{ text: userPrompt + `\n[VARIATION_SEED: ${i + 1}]` }, { inlineData: { mimeType: "image/png", data: imageData } }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { responseModalities: ["TEXT", "IMAGE"] }
                        };
                        return fetchWithRetry(GEMINI_API_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) })
                            .then(res => res.ok ? res.json() : null)
                            .then(json => {
                                const b64 = json?.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                                return b64 ? `data:image/jpeg;base64,${b64}` : null;
                            })
                            .catch(() => null);
                    });

                    // Wait for all to complete
                    const results = await Promise.all(requests);
                    const successResults = results.filter(Boolean);

                    if (successResults.length === 0) {
                        throw new Error("All generation attempts failed.");
                    }

                    setMockupResults(successResults);
                    setSelectedIdx(0);
                    pushToast("success", "Batch Complete!", `${successResults.length}/${BATCH_COUNT} mockups generated. Pick your favorite!`);
                } catch (err) {
                    console.error(err);
                    pushToast("error", "Generation Failed", err.message);
                } finally {
                    setIsLoading(false);
                }
            };


            // ============================================================================
            // EXPORT UTILITIES
            // ============================================================================
            const exportPresetsToJson = () => {
                const config = {
                    discType, productType, presetStyle, customScene,
                    adjustments: { zoom: imgZoom, rotation: imgRotation, panX: imgPanX, panY: imgPanY }
                };
                const jsonStr = JSON.stringify(config, null, 2);

                // Try modern clipboard API first, fallback to textarea method
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(jsonStr)
                        .then(() => pushToast("success", "Copied!", "JSON preset copied to clipboard."))
                        .catch(() => fallbackCopy(jsonStr));
                } else {
                    fallbackCopy(jsonStr);
                }
            };

            const fallbackCopy = (text) => {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px';
                document.body.appendChild(ta);
                ta.select();
                try {
                    document.execCommand('copy');
                    pushToast("success", "Copied!", "JSON preset copied to clipboard.");
                } catch {
                    pushToast("error", "Copy Failed", "Could not copy to clipboard.");
                }
                document.body.removeChild(ta);
            };

            const downloadMockup = (idx) => {
                const url = mockupResults[idx !== undefined ? idx : selectedIdx];
                if (!url) return;
                const a = document.createElement("a");
                a.href = url;
                a.download = `mockup_v${(idx !== undefined ? idx : selectedIdx) + 1}_${Date.now()}.jpg`;
                a.click();
            };

            // Build high-res transparent PNG: circular clip + polish filters
            const buildPrintPNG = useCallback(() => {
                return new Promise((resolve) => {
                    if (!circularPreviewURL) return resolve(null);

                    const img = new Image();
                    img.onload = () => {
                        const size = img.width; // Already DISC_PX
                        const canvas = document.createElement('canvas');
                        canvas.width = size;
                        canvas.height = size;
                        const ctx = canvas.getContext('2d');

                        // Transparent background (no fill)
                        // Circular clip mask
                        ctx.beginPath();
                        ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
                        ctx.closePath();
                        ctx.clip();

                        // Apply polish filters
                        ctx.filter = `brightness(${printBrightness}%) contrast(${printContrast}%) saturate(${printSaturation}%)`;
                        ctx.drawImage(img, 0, 0);

                        resolve(canvas.toDataURL('image/png'));
                    };
                    img.src = circularPreviewURL;
                });
            }, [circularPreviewURL, printBrightness, printContrast, printSaturation]);

            // Auto-analyze mockup result to compute brightness/contrast delta
            const autoAnalyzeMockup = useCallback(() => {
                if (!circularPreviewURL || mockupResults.length === 0) return;

                const analyzeImage = (src) => {
                    return new Promise((resolve) => {
                        const img = new Image();
                        img.onload = () => {
                            const c = document.createElement('canvas');
                            // Sample at small size for performance
                            const sampleSize = 64;
                            c.width = sampleSize;
                            c.height = sampleSize;
                            const ctx = c.getContext('2d');
                            ctx.drawImage(img, 0, 0, sampleSize, sampleSize);
                            const data = ctx.getImageData(0, 0, sampleSize, sampleSize).data;

                            let totalR = 0, totalG = 0, totalB = 0, count = 0;
                            // Sample center area (circle)
                            for (let y = 0; y < sampleSize; y++) {
                                for (let x = 0; x < sampleSize; x++) {
                                    const dx = x - sampleSize / 2;
                                    const dy = y - sampleSize / 2;
                                    if (dx * dx + dy * dy > (sampleSize / 2.5) * (sampleSize / 2.5)) continue;
                                    const i = (y * sampleSize + x) * 4;
                                    if (data[i + 3] < 128) continue; // skip transparent
                                    totalR += data[i];
                                    totalG += data[i + 1];
                                    totalB += data[i + 2];
                                    count++;
                                }
                            }
                            if (count === 0) return resolve({ brightness: 128, saturation: 128 });
                            const avgR = totalR / count, avgG = totalG / count, avgB = totalB / count;
                            const brightness = (avgR + avgG + avgB) / 3;
                            const max = Math.max(avgR, avgG, avgB), min = Math.min(avgR, avgG, avgB);
                            const saturation = max === 0 ? 0 : (max - min) / max * 255;
                            resolve({ brightness, saturation });
                        };
                        img.src = src;
                    });
                };

                Promise.all([
                    analyzeImage(circularPreviewURL),
                    analyzeImage(mockupResults[selectedIdx])
                ]).then(([preview, mockup]) => {
                    // Calculate ratios
                    const bRatio = preview.brightness > 0 ? mockup.brightness / preview.brightness : 1;
                    const sRatio = preview.saturation > 0 ? mockup.saturation / preview.saturation : 1;

                    // Apply as percentage (clamped 70-130)
                    const newB = Math.round(Math.max(70, Math.min(130, bRatio * 100)));
                    const newS = Math.round(Math.max(70, Math.min(130, sRatio * 100)));

                    setPrintBrightness(newB);
                    setPrintContrast(100); // contrast is harder to auto-detect, keep neutral
                    setPrintSaturation(newS);

                    pushToast("success", "Auto-Analyzed", `Brightness: ${newB}%, Saturation: ${newS}%`);
                });
            }, [circularPreviewURL, mockupResults, selectedIdx, pushToast]);

            const downloadPrintPNG = async () => {
                if (!circularPreviewURL) return pushToast("error", "No Image", "Upload an image first.");

                setLoadingText("Building print-ready PNG...");
                setIsLoading(true);

                try {
                    const pngData = await buildPrintPNG();
                    if (!pngData) throw new Error("Failed to build print image.");

                    const a = document.createElement('a');
                    a.href = pngData;
                    a.download = `Print_Ready_20cm_${Date.now()}.png`;
                    a.click();

                    pushToast("success", "PNG Downloaded", `High-res transparent PNG (${DISC_PX}px) ready for print.`);
                } catch (err) {
                    console.error(err);
                    pushToast("error", "Export Failed", err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            // ============================================================================
            // UI RENDER
            // ============================================================================
            return (
                <div className="min-h-screen flex flex-col font-sans">
                    {/* Header */}
                    <header className="sticky top-0 z-40 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800">
                        <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg text-white font-bold text-xl tracking-tighter">C2</div>
                                <div>
                                    <h1 className="font-bold text-gray-900 dark:text-white leading-tight">Craftr V2</h1>
                                    <p className="text-[10px] uppercase tracking-wider text-gray-500 font-semibold">Premium Generator</p>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={exportPresetsToJson} className="px-3 py-1.5 text-xs font-semibold rounded-lg bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition">
                                    Copy JSON
                                </button>
                                <button onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')} className="p-2 rounded-lg bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition">
                                    {theme === 'dark' ? '☀️' : '🌙'}
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Main Layout */}
                    <main className="flex-1 max-w-7xl mx-auto w-full p-4 gap-6 flex flex-col lg:flex-row items-start">

                        {/* LEFT PANEL: Preview & Mockup */}
                        <div className="flex-1 w-full space-y-4">
                            <div className="glass-panel rounded-2xl p-6 shadow-xl relative min-h-[500px] flex flex-col items-center justify-center border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900">
                                {!originalImage ? (
                                    <div
                                        className="w-full max-w-md aspect-square border-2 border-dashed border-gray-300 dark:border-gray-700 rounded-full flex flex-col items-center justify-center cursor-pointer hover:border-indigo-500 hover:bg-indigo-50 dark:hover:bg-indigo-900/20 transition group"
                                        onClick={() => fileInputRef.current?.click()}
                                    >
                                        <div className="w-16 h-16 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                                            <span className="text-2xl">📸</span>
                                        </div>
                                        <p className="font-medium text-gray-600 dark:text-gray-300">Click to upload design</p>
                                        <p className="text-xs text-gray-400 mt-1">Recommended: 2000x2000px</p>
                                    </div>
                                ) : (
                                    <div className="w-full flex flex-col items-center gap-6">
                                        {/* Main Preview / Results */}
                                        {mockupResults.length > 0 ? (
                                            <>
                                                {/* Selected mockup (large) */}
                                                <div className="relative w-full max-w-lg aspect-square rounded-xl overflow-hidden shadow-2xl bg-gray-100 dark:bg-gray-950">
                                                    <img src={mockupResults[selectedIdx]} alt={`Mockup ${selectedIdx + 1}`} className="w-full h-full object-cover" />
                                                    <div className="absolute top-3 left-3 bg-black/60 text-white px-2.5 py-1 rounded-lg text-xs font-bold backdrop-blur-sm">
                                                        Variation {selectedIdx + 1} of {mockupResults.length}
                                                    </div>
                                                    {isLoading && (
                                                        <div className="absolute inset-0 bg-gray-900/60 backdrop-blur-sm flex flex-col items-center justify-center text-white z-10">
                                                            <div className="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                                                            <p className="font-medium animate-pulse">{loadingText}</p>
                                                        </div>
                                                    )}
                                                </div>

                                                {/* Thumbnail gallery */}
                                                <div className="flex gap-3 w-full max-w-lg justify-center">
                                                    {mockupResults.map((url, i) => (
                                                        <div key={i} onClick={() => setSelectedIdx(i)}
                                                            className={`relative w-24 h-24 rounded-xl overflow-hidden cursor-pointer border-2 transition-all hover:scale-105 ${i === selectedIdx ? 'border-indigo-500 ring-2 ring-indigo-500/30 shadow-lg shadow-indigo-500/20' : 'border-gray-300 dark:border-gray-700 opacity-70 hover:opacity-100'
                                                                }`}>
                                                            <img src={url} alt={`V${i + 1}`} className="w-full h-full object-cover" />
                                                            <div className={`absolute bottom-0 inset-x-0 text-center py-0.5 text-[10px] font-bold ${i === selectedIdx ? 'bg-indigo-600 text-white' : 'bg-black/50 text-gray-300'}`}>
                                                                V{i + 1}
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </>
                                        ) : (
                                            <div className={`relative w-full max-w-lg aspect-square rounded-full overflow-hidden shadow-2xl bg-white`}>
                                                <img src={circularPreviewURL} alt="Preview" className="w-full h-full object-cover" />
                                                {isLoading && (
                                                    <div className="absolute inset-0 bg-gray-900/60 backdrop-blur-sm flex flex-col items-center justify-center text-white z-10">
                                                        <div className="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                                                        <p className="font-medium animate-pulse">{loadingText}</p>
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        {/* Adjustment Controls — only show before generate */}
                                        {mockupResults.length === 0 && !isLoading && (
                                            <div className="w-full max-w-lg space-y-4 bg-gray-50 dark:bg-gray-900/80 rounded-2xl p-5 border border-gray-200 dark:border-gray-700/50">
                                                <div className="flex items-center justify-between">
                                                    <h3 className="text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400 flex items-center gap-2">
                                                        <span>🎯</span> Image Adjustments
                                                    </h3>
                                                    <button onClick={() => { setImgZoom(1); setImgRotation(0); setImgPanX(0); setImgPanY(0); }} className="text-[10px] font-bold px-2 py-1 rounded-md bg-gray-200 dark:bg-gray-800 text-indigo-500 hover:bg-indigo-100 dark:hover:bg-indigo-900/30 transition">Reset All</button>
                                                </div>

                                                {/* Zoom */}
                                                <div className="space-y-1">
                                                    <div className="flex items-center justify-between">
                                                        <label className="text-[11px] font-semibold text-gray-500 dark:text-gray-400">🔍 Zoom</label>
                                                        <span className="text-[11px] font-mono text-indigo-400 bg-gray-800 px-2 py-0.5 rounded">{Math.round(imgZoom * 100)}%</span>
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <button className="nudge-btn" onClick={() => setImgZoom(z => Math.max(0.3, +(z - 0.05).toFixed(2)))}>-</button>
                                                        <input type="range" min="0.3" max="2.5" step="0.01" value={imgZoom} onChange={e => setImgZoom(parseFloat(e.target.value))} className="adj-slider flex-1" />
                                                        <button className="nudge-btn" onClick={() => setImgZoom(z => Math.min(2.5, +(z + 0.05).toFixed(2)))}>+</button>
                                                    </div>
                                                </div>

                                                {/* Rotation */}
                                                <div className="space-y-1">
                                                    <div className="flex items-center justify-between">
                                                        <label className="text-[11px] font-semibold text-gray-500 dark:text-gray-400">🔄 Rotate</label>
                                                        <span className="text-[11px] font-mono text-indigo-400 bg-gray-800 px-2 py-0.5 rounded">{imgRotation}°</span>
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <button className="nudge-btn" onClick={() => setImgRotation(r => Math.max(-180, r - 5))}>↺</button>
                                                        <input type="range" min="-180" max="180" step="0.5" value={imgRotation} onChange={e => setImgRotation(parseFloat(e.target.value))} className="adj-slider flex-1" />
                                                        <button className="nudge-btn" onClick={() => setImgRotation(r => Math.min(180, r + 5))}>↻</button>
                                                    </div>
                                                </div>

                                                {/* Position X */}
                                                <div className="space-y-1">
                                                    <div className="flex items-center justify-between">
                                                        <label className="text-[11px] font-semibold text-gray-500 dark:text-gray-400">↔️ Horizontal</label>
                                                        <span className="text-[11px] font-mono text-indigo-400 bg-gray-800 px-2 py-0.5 rounded">{imgPanX > 0 ? '+' : ''}{imgPanX.toFixed(1)}</span>
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <button className="nudge-btn" onClick={() => setImgPanX(x => Math.max(-40, +(x - 1).toFixed(1)))}>◀</button>
                                                        <input type="range" min="-40" max="40" step="0.2" value={imgPanX} onChange={e => setImgPanX(parseFloat(e.target.value))} className="adj-slider flex-1" />
                                                        <button className="nudge-btn" onClick={() => setImgPanX(x => Math.min(40, +(x + 1).toFixed(1)))}>▶</button>
                                                    </div>
                                                </div>

                                                {/* Position Y */}
                                                <div className="space-y-1">
                                                    <div className="flex items-center justify-between">
                                                        <label className="text-[11px] font-semibold text-gray-500 dark:text-gray-400">↕️ Vertical</label>
                                                        <span className="text-[11px] font-mono text-indigo-400 bg-gray-800 px-2 py-0.5 rounded">{imgPanY > 0 ? '+' : ''}{imgPanY.toFixed(1)}</span>
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <button className="nudge-btn" onClick={() => setImgPanY(y => Math.max(-40, +(y - 1).toFixed(1)))}>▲</button>
                                                        <input type="range" min="-40" max="40" step="0.2" value={imgPanY} onChange={e => setImgPanY(parseFloat(e.target.value))} className="adj-slider flex-1" />
                                                        <button className="nudge-btn" onClick={() => setImgPanY(y => Math.min(40, +(y + 1).toFixed(1)))}>▼</button>
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        {/* Print Polish Panel — show after mockup generated */}
                                        {mockupResults.length > 0 && (
                                            <div className="w-full max-w-lg bg-gradient-to-br from-emerald-900/20 to-teal-900/20 border border-emerald-500/20 rounded-2xl p-5 space-y-3">
                                                <div className="flex items-center justify-between">
                                                    <h3 className="text-xs font-bold uppercase tracking-wider text-emerald-400 flex items-center gap-2">
                                                        <span>🖨️</span> Print Polish
                                                    </h3>
                                                    <div className="flex gap-2">
                                                        <button onClick={autoAnalyzeMockup} className="text-[10px] font-bold px-2 py-1 rounded-md bg-emerald-800/50 text-emerald-300 hover:bg-emerald-700/50 transition">✨ Auto Match</button>
                                                        <button onClick={() => { setPrintBrightness(100); setPrintContrast(100); setPrintSaturation(100); }} className="text-[10px] font-bold px-2 py-1 rounded-md bg-gray-800 text-emerald-400 hover:bg-emerald-900/30 transition">Reset</button>
                                                    </div>
                                                </div>
                                                <p className="text-[10px] text-gray-400">Match print to mockup. "Auto Match" analyzes the mockup and adjusts automatically.</p>

                                                <div className="flex items-center gap-4">
                                                    <div className="w-20 h-20 rounded-full overflow-hidden border-2 border-emerald-500/30 flex-shrink-0" style={{ background: 'repeating-conic-gradient(#808080 0% 25%, transparent 0% 50%) 50% / 10px 10px' }}>
                                                        {circularPreviewURL && <img src={circularPreviewURL} alt="Print" className="w-full h-full object-cover" style={{ filter: `brightness(${printBrightness}%) contrast(${printContrast}%) saturate(${printSaturation}%)` }} />}
                                                    </div>
                                                    <div className="flex-1 space-y-2">
                                                        <div className="flex items-center gap-2">
                                                            <label className="text-[10px] w-12 text-gray-400">☀️ Bright</label>
                                                            <input type="range" min="70" max="130" step="1" value={printBrightness} onChange={e => setPrintBrightness(parseInt(e.target.value))} className="adj-slider flex-1" />
                                                            <span className="text-[10px] font-mono text-emerald-400 w-10 text-right">{printBrightness}%</span>
                                                        </div>
                                                        <div className="flex items-center gap-2">
                                                            <label className="text-[10px] w-12 text-gray-400">◐ Contr</label>
                                                            <input type="range" min="70" max="130" step="1" value={printContrast} onChange={e => setPrintContrast(parseInt(e.target.value))} className="adj-slider flex-1" />
                                                            <span className="text-[10px] font-mono text-emerald-400 w-10 text-right">{printContrast}%</span>
                                                        </div>
                                                        <div className="flex items-center gap-2">
                                                            <label className="text-[10px] w-12 text-gray-400">🎨 Satur</label>
                                                            <input type="range" min="70" max="130" step="1" value={printSaturation} onChange={e => setPrintSaturation(parseInt(e.target.value))} className="adj-slider flex-1" />
                                                            <span className="text-[10px] font-mono text-emerald-400 w-10 text-right">{printSaturation}%</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        {/* Actions */}
                                        <div className="flex flex-wrap justify-center gap-3 w-full">
                                            <button onClick={() => { setMockupResults([]); setSelectedIdx(0); }} className="px-4 py-2 rounded-lg bg-gray-200 dark:bg-gray-800 text-sm font-semibold hover:bg-gray-300 dark:hover:bg-gray-700 transition">
                                                {mockupResults.length > 0 ? '← Back to Edit' : 'Change Design'}
                                            </button>
                                            {mockupResults.length > 0 && (
                                                <>
                                                    <button onClick={() => downloadMockup()} className="px-4 py-2 rounded-lg bg-indigo-600 text-white text-sm font-semibold hover:bg-indigo-700 shadow-lg shadow-indigo-500/30 transition">
                                                        ↓ Download V{selectedIdx + 1}
                                                    </button>
                                                    <button onClick={() => mockupResults.forEach((_, i) => downloadMockup(i))} className="px-4 py-2 rounded-lg bg-purple-600 text-white text-sm font-semibold hover:bg-purple-700 shadow-lg shadow-purple-500/30 transition">
                                                        ↓ Download All
                                                    </button>
                                                </>
                                            )}
                                            <button onClick={downloadPrintPNG} className="px-4 py-2 rounded-lg bg-emerald-600 text-white text-sm font-semibold hover:bg-emerald-700 shadow-lg shadow-emerald-500/30 transition">
                                                🖨️ Print PNG
                                            </button>
                                        </div>
                                    </div>
                                )}
                                <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={handleFileUpload} />
                            </div>
                        </div>

                        {/* RIGHT PANEL: Controls */}
                        <div className="w-full lg:w-[400px] flex-shrink-0 space-y-6">
                            <div className="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl p-5 shadow-lg">
                                <h2 className="text-sm font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-4">Product Settings</h2>

                                {/* Geometry */}
                                <div className="space-y-2 mb-5">
                                    <label className="text-xs font-semibold">Geometry Format</label>
                                    <div className="grid grid-cols-2 gap-2">
                                        {[
                                            { id: 'polos', label: 'Polos (Full Print)', icon: '⚪' },
                                            { id: 'dvd', label: 'DVD (Center Hole)', icon: '💿' }
                                        ].map(o => (
                                            <button key={o.id} onClick={() => setDiscType(o.id)}
                                                className={`p-3 rounded-xl border text-left flex flex-col gap-1 transition ${discType === o.id ? 'border-indigo-500 bg-indigo-50 dark:bg-indigo-900/20 text-indigo-700 dark:text-indigo-300' : 'border-gray-200 dark:border-gray-700 hover:border-gray-300 dark:hover:border-gray-600'}`}>
                                                <span className="text-xl">{o.icon}</span>
                                                <span className="text-xs font-semibold">{o.label}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* Placement */}
                                <div className="space-y-2 mb-5">
                                    <label className="text-xs font-semibold">Display Placement</label>
                                    <div className="grid grid-cols-2 gap-2">
                                        {[
                                            { id: 'table_stand', label: 'Table Stand' },
                                            { id: 'wall_mount', label: 'Wall Mount' },
                                            { id: 'framed', label: 'Framed Box' },
                                            { id: 'both', label: 'Both (Combo)' }
                                        ].map(o => (
                                            <button key={o.id} onClick={() => setProductType(o.id)}
                                                className={`p-2 rounded-lg border text-xs font-medium text-center transition ${productType === o.id ? 'border-indigo-500 bg-indigo-50 dark:bg-indigo-900/20 text-indigo-700 dark:text-indigo-300' : 'border-gray-200 dark:border-gray-700 hover:border-gray-300 dark:hover:border-gray-600'}`}>
                                                {o.label}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* Scene Style */}
                                <div className="space-y-2 mb-6">
                                    <label className="text-xs font-semibold">Scene Environment</label>
                                    <select
                                        value={presetStyle} onChange={e => setPresetStyle(e.target.value)}
                                        className="w-full bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none"
                                    >
                                        {SCENE_PRESETS.map(p => <option key={p.value} value={p.value}>{p.label}</option>)}
                                        <option value="custom">Custom (Write Prompt)</option>
                                    </select>

                                    {presetStyle === 'custom' && (
                                        <textarea
                                            value={customScene} onChange={e => setCustomScene(e.target.value)}
                                            placeholder="Describe the background and lighting..."
                                            className="w-full mt-2 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg p-3 text-sm min-h-[80px] focus:ring-2 focus:ring-indigo-500 outline-none"
                                        />
                                    )}
                                </div>

                                <button
                                    onClick={handleGenerate}
                                    disabled={isLoading || !originalImage}
                                    className="w-full py-3.5 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold shadow-xl shadow-indigo-500/20 hover:shadow-indigo-500/40 hover:scale-[1.02] active:scale-95 transition-all disabled:opacity-50 disabled:pointer-events-none"
                                >
                                    {isLoading ? 'Processing...' : 'Generate 3 Mockups 🚀'}
                                </button>
                            </div>
                        </div>

                    </main>

                    {/* Toast Container */}
                    <div className="fixed bottom-4 right-4 flex flex-col gap-2 z-50 pointer-events-none">
                        {toasts.map(t => (
                            <div key={t.id} className={`p-4 rounded-xl shadow-2xl flex items-start gap-3 w-80 animate-[slideIn_0.3s_ease-out] backdrop-blur-md border ${t.type === 'error' ? 'bg-red-50/90 dark:bg-red-900/90 border-red-200 dark:border-red-800 text-red-900 dark:text-red-100' : 'bg-green-50/90 dark:bg-green-900/90 border-green-200 dark:border-green-800 text-green-900 dark:text-green-100'}`}>
                                <div className="text-xl">{t.type === 'error' ? '⚠️' : '✅'}</div>
                                <div>
                                    <h4 className="font-bold text-sm">{t.title}</h4>
                                    <p className="text-xs opacity-80 mt-0.5">{t.message}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<CraftrStudioV2 />);
    </script>

    <style>
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</body>

</html>
