<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Craftr Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --bg: #f7f8fc;
      --surface: #f7f8fc;
      --panel: #ffffff;
      --panel-2: #f8fafc;
      --ink: #101828;
      --muted: #667085;
      --line: #e6e8ef;
      --accent: #7c3aed;
      --accent-2: #00c4cc;
      --accent-soft: #ecfeff;
      --accent-wash: #f5f3ff;
      --good: #12b76a;
      --shadow: 0 22px 54px rgba(16, 24, 40, 0.09);
      --shadow-soft: 0 8px 22px rgba(16, 24, 40, 0.06);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      font-family: var(--font);
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 8%, rgba(0, 196, 204, 0.14), transparent 26%),
        radial-gradient(circle at 92% 4%, rgba(124, 58, 237, 0.12), transparent 28%),
        linear-gradient(180deg, #fbfcff 0%, var(--bg) 46%, #eef2f7 100%);
      font-family: var(--font);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:focus-visible,
    iframe:focus-visible {
      outline: 3px solid rgba(0, 196, 204, 0.28);
      outline-offset: 2px;
    }

    .hub {
      height: 100dvh;
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      gap: 16px;
      padding: 18px;
      background: transparent;
    }

    .topbar {
      position: relative;
      z-index: 30;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 18px;
      min-height: 0;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 26px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .brand {
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 21px;
      line-height: 1;
      letter-spacing: 0;
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .tabs {
      z-index: 40;
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
      padding: 0;
    }

    .tab {
      border: 1px solid transparent;
      min-width: 0;
      min-height: 54px;
      border-radius: 16px;
      padding: 9px 10px;
      color: var(--muted);
      background: transparent;
      font-size: 13px;
      font-weight: 900;
      transition: border-color 0.18s ease, background 0.18s ease, color 0.18s ease, transform 0.18s ease;
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
    }

    .tab:hover {
      background: linear-gradient(135deg, rgba(236, 254, 255, 0.7), rgba(245, 243, 255, 0.82));
      color: var(--accent);
      transform: translateY(-1px);
    }

    .tab.active {
      color: #6d28d9;
      border-color: rgba(124, 58, 237, 0.2);
      background: linear-gradient(135deg, rgba(236, 254, 255, 0.96), rgba(245, 243, 255, 0.98));
      box-shadow: 0 12px 26px rgba(14, 165, 233, 0.14);
    }

    .tab-icon {
      width: 34px;
      height: 34px;
      flex: 0 0 34px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: #ffffff;
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      font-size: 11px;
      line-height: 1;
      box-shadow: 0 10px 22px rgba(14, 165, 233, 0.16);
    }

    .tab-text {
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .viewport {
      position: relative;
      min-height: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 26px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    iframe {
      display: none;
      width: 100%;
      height: 100%;
      border: 0;
      background: white;
    }

    iframe.active {
      display: block;
    }

    .status {
      position: absolute;
      left: 12px;
      bottom: 12px;
      z-index: 20;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(22, 163, 74, 0.18);
      border-radius: 999px;
      padding: 7px 10px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--good);
      font-size: 11px;
      font-weight: 900;
      pointer-events: none;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--good);
      box-shadow: 0 0 18px rgba(34, 197, 94, 0.72);
    }

    @media (max-width: 980px) {
      body {
        overflow: hidden;
      }

      .hub {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(0, 1fr);
        height: 100dvh;
        min-height: 0;
        gap: 0;
        padding: 0;
      }

      .topbar {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        min-height: 58px;
        padding: max(12px, env(safe-area-inset-top, 0px)) 14px 10px;
        border: 0;
        border-bottom: 1px solid var(--line);
        border-radius: 0;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
      }

      .brand p {
        display: none;
      }

      .brand h1 {
        font-size: 17px;
      }

      .tabs {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 50;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
        padding: 8px 10px calc(8px + var(--safe-bottom));
        border-top: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 -16px 38px rgba(15, 23, 42, 0.1);
        backdrop-filter: blur(22px);
      }

      .tab {
        min-height: 54px;
        justify-content: center;
        display: grid;
        place-items: center;
        gap: 3px;
        padding: 7px 6px;
        font-size: 10px;
        text-align: center;
      }

      .tab-icon {
        width: 25px;
        height: 25px;
        flex-basis: 25px;
        border-radius: 10px;
        font-size: 10px;
      }

      .viewport {
        border: 0;
        border-radius: 0;
        height: auto;
        min-height: 0;
        box-shadow: none;
        padding-bottom: calc(72px + var(--safe-bottom));
      }

      .status {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="hub">
    <header class="topbar">
      <div class="brand">
        <h1>Craftr Hub</h1>
        <p>Single Canvas workspace for all saved Craftr tools.</p>
      </div>

      <nav id="tabs" class="tabs" aria-label="Craftr tools"></nav>

    </header>

    <section id="viewport" class="viewport" aria-label="Active Craftr tool">
      <div class="status"><span class="dot"></span><span id="activeLabel"></span></div>
    </section>
  </main>

  <script>
    const apiKey = ''; // System injected
    const apps = __APPS_JSON__;
    const tabsEl = document.getElementById('tabs');
    const viewport = document.getElementById('viewport');
    const activeLabel = document.getElementById('activeLabel');
    const frames = new Map();
    let activeId = apps[0].id;

    const withCanvasApiKey = (rawUrl) => {
      const url = new URL(rawUrl);

      if (url.hostname === 'generativelanguage.googleapis.com' && !url.searchParams.get('key')) {
        url.searchParams.set('key', apiKey);
      }

      return url.toString();
    };

    window.addEventListener('message', async (event) => {
      const message = event.data;
      if (!message || message.type !== 'craftr-gemini-fetch') return;

      try {
        const response = await fetch(withCanvasApiKey(message.url), message.options || {});
        const headers = Array.from(response.headers.entries());
        const body = await response.text();

        event.source.postMessage(
          {
            type: 'craftr-gemini-fetch-result',
            id: message.id,
            ok: true,
            response: {
              body,
              headers,
              status: response.status,
              statusText: response.statusText,
            },
          },
          '*',
        );
      } catch (error) {
        event.source.postMessage(
          {
            type: 'craftr-gemini-fetch-result',
            id: message.id,
            ok: false,
            error: error.message || 'Gemini request failed',
          },
          '*',
        );
      }
    });

    const createFrame = (app) => {
      const frame = document.createElement('iframe');
      frame.id = app.id;
      frame.title = app.label;
      frame.setAttribute('allow', 'clipboard-read; clipboard-write; fullscreen');
      frame.srcdoc = app.html;
      viewport.insertBefore(frame, viewport.firstChild);
      frames.set(app.id, frame);
      return frame;
    };

    const setActive = (id) => {
      activeId = id;
      const app = apps.find((item) => item.id === id);
      if (!frames.has(id)) createFrame(app);

      frames.forEach((frame, frameId) => {
        frame.classList.toggle('active', frameId === id);
      });

      document.querySelectorAll('.tab').forEach((tab) => {
        tab.classList.toggle('active', tab.dataset.target === id);
      });

      activeLabel.textContent = `${app.label} active`;
      document.title = `Craftr Hub - ${app.label}`;
    };

    apps.forEach((app) => {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'tab';
      button.dataset.target = app.id;
      const icon = document.createElement('span');
      icon.className = 'tab-icon';
      icon.textContent = app.label
        .split(/\s+/)
        .map((word) => word[0])
        .join('')
        .slice(0, 2)
        .toUpperCase();
      const text = document.createElement('span');
      text.className = 'tab-text';
      text.textContent = app.label.replace(' Generator', '').replace(' Studio', '');
      button.append(icon, text);
      button.addEventListener('click', () => setActive(app.id));
      tabsEl.appendChild(button);
    });

    setActive(activeId);
  </script>
</body>
</html>
