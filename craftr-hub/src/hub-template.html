<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f4f5fa" />
  <title>Craftr Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"></noscript>
  <style>
    :root {
      --font: "Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --bg: #f4f5fa;
      --panel: #ffffff;
      --panel-soft: rgba(255, 255, 255, 0.78);
      --ink: #0b1220;
      --ink-2: #1f2937;
      --muted: #5a6478;
      --soft: #8b93a7;
      --line: #e5e8f0;
      --line-strong: #d6dae5;
      --accent: #7c3aed;
      --accent-2: #06b6d4;
      --accent-3: #ec4899;
      --accent-wash: #f5f3ff;
      --accent-soft: #ecfeff;
      --good: #10b981;
      --brand-gradient: linear-gradient(135deg, #06b6d4 0%, #7c3aed 50%, #ec4899 100%);
      --shadow-xs: 0 1px 2px rgba(11, 18, 32, 0.04);
      --shadow-sm: 0 2px 6px rgba(11, 18, 32, 0.05), 0 1px 2px rgba(11, 18, 32, 0.04);
      --shadow: 0 10px 24px -8px rgba(11, 18, 32, 0.08), 0 4px 10px -2px rgba(11, 18, 32, 0.04);
      --shadow-md: 0 18px 38px -12px rgba(11, 18, 32, 0.12), 0 8px 16px -4px rgba(11, 18, 32, 0.06);
      --shadow-lg: 0 28px 56px -16px rgba(11, 18, 32, 0.16), 0 12px 22px -6px rgba(11, 18, 32, 0.08);
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      font-family: var(--font);
      font-feature-settings: "ss01", "cv11";
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      letter-spacing: -0.005em;
      background:
        radial-gradient(1200px 600px at 10% -4%, rgba(6, 182, 212, 0.13), transparent 58%),
        radial-gradient(900px 500px at 96% -2%, rgba(124, 58, 237, 0.11), transparent 56%),
        radial-gradient(700px 500px at 92% 102%, rgba(236, 72, 153, 0.08), transparent 60%),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 52%, #edf1f9 100%);
      font-family: var(--font);
    }

    button, input, select, textarea {
      font: inherit;
      letter-spacing: inherit;
    }

    button { cursor: pointer; }

    button:focus-visible, iframe:focus-visible {
      outline: 3px solid rgba(6, 182, 212, 0.32);
      outline-offset: 2px;
    }

    /* ─── Layout shell ──────────────────────────────────────────────── */
    .hub {
      height: 100dvh;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 18px;
      padding: 18px;
      background: transparent;
    }

    /* ─── Sidebar ───────────────────────────────────────────────────── */
    .sidebar {
      position: relative;
      z-index: 30;
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-height: 0;
      padding: 22px 18px 18px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.96) 0%, rgba(250, 251, 254, 0.92) 100%);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }

    .sidebar::before {
      content: "";
      position: absolute;
      inset: -1px -1px auto -1px;
      height: 140px;
      background:
        radial-gradient(260px 120px at 24% 10%, rgba(6, 182, 212, 0.18), transparent 65%),
        radial-gradient(260px 120px at 84% 18%, rgba(124, 58, 237, 0.16), transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .brand {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
    }

    .brand-mark {
      width: 40px;
      height: 40px;
      flex: 0 0 40px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--brand-gradient);
      box-shadow: 0 12px 28px -8px rgba(124, 58, 237, 0.42), 0 4px 10px -2px rgba(6, 182, 212, 0.22);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0;
      line-height: 1;
    }

    .brand-text { min-width: 0; }

    .brand-text h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.02em;
      background: var(--brand-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }

    .brand-text p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      line-height: 1.4;
      letter-spacing: 0;
    }

    /* ─── Navigation label ──────────────────────────────────────────── */
    .nav-label {
      position: relative;
      z-index: 1;
      margin: 0;
      padding: 0 8px;
      color: var(--soft);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ─── Tabs list ─────────────────────────────────────────────────── */
    .tabs {
      position: relative;
      z-index: 1;
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
      padding: 0;
      overflow-y: auto;
    }

    .tabs::-webkit-scrollbar { width: 6px; }
    .tabs::-webkit-scrollbar-track { background: transparent; }
    .tabs::-webkit-scrollbar-thumb {
      background: var(--line);
      border-radius: 999px;
    }

    .tab {
      position: relative;
      border: 1px solid transparent;
      min-height: 56px;
      border-radius: 16px;
      padding: 10px 12px;
      color: var(--ink-2);
      background: transparent;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -0.005em;
      transition: border-color 0.22s var(--ease), background 0.22s var(--ease), color 0.22s var(--ease), transform 0.22s var(--ease), box-shadow 0.22s var(--ease);
      display: flex;
      align-items: center;
      gap: 12px;
      text-align: left;
    }

    .tab:hover {
      background: rgba(245, 243, 255, 0.7);
      color: var(--accent);
      transform: translateX(2px);
    }

    .tab.active {
      color: #5b21b6;
      border-color: rgba(124, 58, 237, 0.18);
      background:
        linear-gradient(135deg, rgba(236, 254, 255, 0.9), rgba(245, 243, 255, 0.96));
      box-shadow: 0 10px 24px -10px rgba(124, 58, 237, 0.28), var(--shadow-xs);
    }

    .tab.active::before {
      content: "";
      position: absolute;
      left: -1px;
      top: 12px;
      bottom: 12px;
      width: 3px;
      border-radius: 999px;
      background: var(--brand-gradient);
    }

    .tab-icon {
      width: 36px;
      height: 36px;
      flex: 0 0 36px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: #ffffff;
      background: linear-gradient(135deg, #94a3b8, #64748b);
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0;
      transition: background 0.22s var(--ease), box-shadow 0.22s var(--ease), transform 0.22s var(--ease);
    }

    .tab:hover .tab-icon {
      background: linear-gradient(135deg, #06b6d4, #7c3aed);
      box-shadow: 0 8px 16px -4px rgba(124, 58, 237, 0.32);
    }

    .tab.active .tab-icon {
      background: var(--brand-gradient);
      box-shadow: 0 10px 22px -6px rgba(124, 58, 237, 0.42), 0 4px 8px -2px rgba(6, 182, 212, 0.26);
      transform: scale(1.02);
    }

    .tab-text {
      min-width: 0;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      letter-spacing: -0.01em;
    }

    .tab.active .tab-text {
      font-weight: 900;
    }

    /* ─── Sidebar footer ────────────────────────────────────────────── */
    .sidebar-footer {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .sidebar-footer .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 999px;
      padding: 4px 9px;
      color: var(--good);
      background: rgba(16, 185, 129, 0.08);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.02em;
      transition: transform 0.22s var(--ease);
    }

    .sidebar-footer .pill:hover {
      transform: scale(1.04);
    }

    /* ─── Viewport ──────────────────────────────────────────────────── */
    .viewport {
      position: relative;
      min-height: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: var(--shadow-md);
      contain: content;
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: white;
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      contain: strict;
    }

    iframe.active {
      visibility: visible;
      opacity: 1;
      pointer-events: auto;
      contain: content;
      animation: fadeIn 0.2s ease;
    }

    iframe.is-loading {
      opacity: 0;
      will-change: opacity;
    }

    /* GPU layer promotion: translate3d forces compositing without visual change */
    @keyframes fadeIn {
      from { opacity: 0; transform: translate3d(0, 0, 0); }
      to { opacity: 1; transform: translate3d(0, 0, 0); }
    }

    /* ─── Viewport loading shimmer ──────────────────────────────────── */
    .viewport-loading::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 5;
      background: linear-gradient(90deg, #f4f5fa 25%, #eef1f6 50%, #f4f5fa 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: inherit;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .status {
      position: absolute;
      left: 14px;
      bottom: 14px;
      z-index: 20;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.94);
      color: var(--good);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: -0.005em;
      pointer-events: none;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: var(--shadow-sm);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--good);
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.22), 0 0 18px rgba(16, 185, 129, 0.6);
      will-change: box-shadow;
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.22), 0 0 18px rgba(16, 185, 129, 0.6); }
      50% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0.06), 0 0 22px rgba(16, 185, 129, 0.7); }
    }

    /* ─── Mobile layout ─────────────────────────────────────────────── */
    @media (max-width: 980px) {
      body { overflow: hidden; }

      .hub {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(0, 1fr);
        height: 100dvh;
        min-height: 0;
        gap: 0;
        padding: 0;
      }

      .sidebar {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        min-height: 62px;
        padding: max(12px, var(--safe-top)) 14px 10px;
        border: 0;
        border-bottom: 1px solid var(--line);
        border-radius: 0;
        box-shadow: 0 10px 24px -10px rgba(11, 18, 32, 0.08);
        overflow: visible;
      }

      .sidebar::before { display: none; }

      .brand { border-bottom: 0; padding-bottom: 0; }
      .brand-text p { display: none; }
      .brand-text h1 { font-size: 15px; }
      .brand-mark { width: 34px; height: 34px; flex-basis: 34px; border-radius: 12px; font-size: 12px; }

      .nav-label,
      .sidebar-footer {
        display: none;
      }

      .tabs {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 50;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
        padding: 8px 10px calc(8px + var(--safe-bottom));
        border-top: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 -16px 38px -8px rgba(11, 18, 32, 0.14);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
      }

      .tab {
        min-height: 58px;
        justify-content: center;
        display: grid;
        place-items: center;
        gap: 3px;
        padding: 7px 6px;
        font-size: 10px;
        text-align: center;
      }

      .tab:hover { transform: none; }

      .tab.active::before { display: none; }

      .tab.active {
        transform: scale(1.02);
      }

      .tab.active::after {
        content: "";
        position: absolute;
        bottom: 4px;
        left: 50%;
        transform: translateX(-50%);
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--brand-gradient);
      }

      .tab-icon {
        width: 26px;
        height: 26px;
        flex-basis: 26px;
        border-radius: 10px;
        font-size: 10px;
      }

      .tab-text { font-size: 10px; }

      .viewport {
        border: 0;
        border-radius: 0;
        height: auto;
        min-height: 0;
        box-shadow: none;
        padding-bottom: calc(72px + var(--safe-bottom));
      }

      .status { display: none; }
    }

    /* ─── Tablet refinement ─────────────────────────────────────────── */
    @media (max-width: 768px) and (min-width: 481px) {
      .tab {
        min-height: 58px;
      }

      .tab-icon {
        width: 28px;
        height: 28px;
        flex-basis: 28px;
      }

      .tabs {
        gap: 8px;
        padding: 10px 12px calc(10px + var(--safe-bottom));
      }
    }

    /* ─── Small phone refinement ────────────────────────────────────── */
    @media (max-width: 480px) {
      .hub {
        padding: 0;
      }

      .brand-mark {
        width: 30px;
        height: 30px;
        flex-basis: 30px;
        border-radius: 10px;
        font-size: 10px;
      }

      .tab-text {
        font-size: 9px;
      }

      .tabs {
        padding: 6px 8px calc(6px + var(--safe-bottom));
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .tab,
      .tab-icon,
      .dot {
        transition: none !important;
        animation: none !important;
      }
      .tab:hover { transform: none; }
      iframe.active { animation: none !important; }
      .viewport-loading::after { animation: none !important; }
    }
  </style>
</head>
<body>
  <main class="hub">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">CR</div>
        <div class="brand-text">
          <h1>Craftr Hub</h1>
          <p>Premium AI creative workspace</p>
        </div>
      </div>

      <p class="nav-label">Tools</p>

      <nav id="tabs" class="tabs" aria-label="Craftr tools"></nav>

      <div class="sidebar-footer">
        <span class="pill">
          <span class="dot" style="animation:none;box-shadow:none;"></span>
          Online
        </span>
        <span>v1.0</span>
      </div>
    </aside>

    <section id="viewport" class="viewport" aria-label="Active Craftr tool">
      <div class="status"><span class="dot"></span><span id="activeLabel"></span></div>
    </section>
  </main>

  <script>
    const apiKey = ''; // System injected
    const apps = __APPS_JSON__;
    const tabsEl = document.getElementById('tabs');
    const viewport = document.getElementById('viewport');
    const activeLabel = document.getElementById('activeLabel');
    const frames = new Map();
    let activeId = apps[0].id;

    const withCanvasApiKey = (rawUrl) => {
      const url = new URL(rawUrl);

      if (url.hostname === 'generativelanguage.googleapis.com' && !url.searchParams.get('key')) {
        url.searchParams.set('key', apiKey);
      }

      return url.toString();
    };

    window.addEventListener('message', async (event) => {
      const message = event.data;
      if (!message || message.type !== 'craftr-gemini-fetch') return;

      try {
        const response = await fetch(withCanvasApiKey(message.url), message.options || {});
        const headers = Array.from(response.headers.entries());
        const body = await response.text();

        event.source.postMessage(
          {
            type: 'craftr-gemini-fetch-result',
            id: message.id,
            ok: true,
            response: {
              body,
              headers,
              status: response.status,
              statusText: response.statusText,
            },
          },
          '*',
        );
      } catch (error) {
        event.source.postMessage(
          {
            type: 'craftr-gemini-fetch-result',
            id: message.id,
            ok: false,
            error: error.message || 'Gemini request failed',
          },
          '*',
        );
      }
    });

    const createFrame = (app) => {
      const frame = document.createElement('iframe');
      frame.id = app.id;
      frame.title = app.label;
      frame.setAttribute('allow', 'clipboard-read; clipboard-write; fullscreen');
      frame.classList.add('is-loading');
      frame.srcdoc = app.html;
      const timeout = setTimeout(() => {
        frame.classList.remove('is-loading');
        viewport.classList.remove('viewport-loading');
      }, 8000);
      frame.addEventListener('load', () => {
        clearTimeout(timeout);
        frame.classList.remove('is-loading');
        viewport.classList.remove('viewport-loading');
      });
      viewport.insertBefore(frame, viewport.firstChild);
      frames.set(app.id, frame);
      return frame;
    };

    const setActive = (id) => {
      activeId = id;
      const app = apps.find((item) => item.id === id);

      if (!frames.has(id)) {
        viewport.classList.add('viewport-loading');
        createFrame(app);
      }

      frames.forEach((frame, frameId) => {
        frame.classList.toggle('active', frameId === id);
      });

      document.querySelectorAll('.tab').forEach((tab) => {
        tab.classList.toggle('active', tab.dataset.target === id);
      });

      activeLabel.textContent = `${app.label} active`;
      document.title = `Craftr Hub - ${app.label}`;
    };

    apps.forEach((app) => {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'tab';
      button.dataset.target = app.id;
      const icon = document.createElement('span');
      icon.className = 'tab-icon';
      icon.textContent = app.label
        .split(/\s+/)
        .map((word) => word[0])
        .join('')
        .slice(0, 2)
        .toUpperCase();
      const text = document.createElement('span');
      text.className = 'tab-text';
      text.textContent = app.label.replace(' Generator', '').replace(' Studio', '');
      button.append(icon, text);
      button.addEventListener('click', () => setActive(app.id));
      tabsEl.appendChild(button);
    });

    setActive(activeId);
  </script>
</body>
</html>
